# uniffi-bindgen-react-native (ubrn) configuration.
#
# Drives the cross-compile of the Rust FFI crate (crates/okena-mobile-ffi) and
# the generation of the JSI TurboModule + TypeScript bindings. Consumed by:
#   npm run ubrn:android   →  ubrn build android --config ubrn.config.yaml --and-generate
#   npm run ubrn:ios       →  ubrn build ios     --config ubrn.config.yaml --and-generate
#
# Requires the mobile toolchain (Android NDK + cargo-ndk, or Xcode) — see
# README.md §"Generate the native module". Not run in CI.
#
# VERSION PAIRING: ubrn and uniffi minor versions must match. This repo uses
# `uniffi-bindgen-react-native` 0.31.0-3 (devDependencies) ↔ `uniffi = "0.31"`
# in crates/okena-mobile-ffi/Cargo.toml. Bump both together.

# Native/JS module name.
name: okena_mobile_ffi

# The Rust crate to build, relative to this file.
rust:
  directory: ../../crates/okena-mobile-ffi
  manifestPath: Cargo.toml

# Where the generated glue lands (both dirs are gitignored — regenerated by
# `npm run ubrn:*`). The hand-written binding contract/shim stays in
# src/native/okena.ts and re-exports from src/generated.
bindings:
  ts: src/generated
  cpp: cpp/generated

# Android: build for all four ABIs. `directory`/`jniLibs` use ubrn defaults
# (android/, android/app/src/main/jniLibs) once the native host project exists.
android:
  targets:
    - arm64-v8a
    - armeabi-v7a
    - x86_64
    - x86

# iOS: device + simulator (sim arch picked to match the build host).
ios:
  targets:
    - aarch64-apple-ios
    - aarch64-apple-ios-sim
